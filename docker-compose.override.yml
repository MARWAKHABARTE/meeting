services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    volumes:
      - ./backend:/app:delegated
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      POSTGRES_SERVER: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      OLLAMA_HOST: http://ollama:11434
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  celery-worker:
    volumes:
      - ./backend:/app:delegated
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    command: celery -A app.workers.celery_app worker --loglevel=debug --pool=solo

  flower:
    volumes:
      - ./backend:/app:delegated

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost/api
      VITE_KEYCLOAK_URL: http://localhost/keycloak
    command: npm run dev -- --host 0.0.0.0 --port 5173

  nginx:
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  keycloak:
    ports:
      - "8080:8080"

  ollama:
    ports:
      - "11434:11434"

  chromadb:
    ports:
      - "8002:8000"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"
