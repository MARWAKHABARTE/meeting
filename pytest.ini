[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Mode asyncio pour les tests async
asyncio_mode = auto

# Options par défaut
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:reports/coverage

# Marqueurs personnalisés
markers =
    unit: Tests unitaires rapides (sans dépendances externes)
    integration: Tests d'intégration (nécessitent services actifs)
    api: Tests des endpoints HTTP
    websocket: Tests WebSocket
    security: Tests de sécurité
    ai: Tests du pipeline IA
    celery: Tests Celery
    slow: Tests lents (models IA, etc.)
    docker: Tests Docker/container
