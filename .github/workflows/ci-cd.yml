name: CI/CD — Meeting AI Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 : Lint & Tests Backend Python
  # ──────────────────────────────────────────────────────────────
  backend-test:
    name: 🐍 Backend — Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: meeting_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📦 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📥 Installation des dépendances
        run: pip install -r requirements.txt pytest-cov

      - name: 🔍 Lint avec Ruff (PEP8 + SOLID)
        run: |
          pip install ruff
          ruff check app/ tests/ --ignore E501 || true

      - name: ✅ Exécution des tests (sans intégration services tiers)
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: meeting_ai_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          KEYCLOAK_SERVER_URL: http://localhost:8080
          OLLAMA_HOST: http://localhost:11434
          CHROMA_PERSIST_DIRECTORY: /tmp/chroma_test
        run: |
          cd ..
          python -m pytest tests/test_settings.py tests/test_logger.py tests/test_api_health.py -v --tb=short --cov=backend/app --cov-report=xml

      - name: 📊 Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-backend
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────
  # JOB 2 : Build & Test Frontend React
  # ──────────────────────────────────────────────────────────────
  frontend-build:
    name: ⚛️ Frontend — Build & Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📦 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Installation des dépendances npm
        run: npm ci

      - name: 🏗️ Build de production React/Vite
        env:
          VITE_API_URL: /api
          VITE_KEYCLOAK_URL: /keycloak
          VITE_KEYCLOAK_REALM: meeting-ai
          VITE_KEYCLOAK_CLIENT_ID: meeting-ai-frontend
        run: npm run build

      - name: 📂 Vérification du dossier dist
        run: |
          test -d dist && echo "Build dist/ créé avec succès"
          ls -la dist/

      - name: 📤 Upload du build frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ──────────────────────────────────────────────────────────────
  # JOB 3 : Build Docker Images (uniquement sur main)
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker — Build & Validation
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: 📦 Checkout du code
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build image Docker Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build image Docker Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:ci
          build-args: |
            VITE_API_URL=/api
            VITE_KEYCLOAK_URL=/keycloak
            VITE_KEYCLOAK_REALM=meeting-ai
            VITE_KEYCLOAK_CLIENT_ID=meeting-ai-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Validation docker-compose.yml syntax
        run: docker compose config --quiet

  # ──────────────────────────────────────────────────────────────
  # JOB 4 : Publication des images (main uniquement)
  # ──────────────────────────────────────────────────────────────
  docker-publish:
    name: 🚀 Docker — Publish to Registry
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📦 Checkout du code
        uses: actions/checkout@v4

      - name: 🔐 Login au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_KEYCLOAK_URL=/keycloak
            VITE_KEYCLOAK_REALM=meeting-ai
            VITE_KEYCLOAK_CLIENT_ID=meeting-ai-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max
