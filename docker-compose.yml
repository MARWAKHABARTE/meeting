services:
  # ────────────────────────────────────────────────────────
  # Base de Données PostgreSQL
  # ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: meeting_ai_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marwakh}
      POSTGRES_DB: ${POSTGRES_DB:-meeting_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────
  # Broker de Messages Redis
  # ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: meeting_ai_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────
  # Stockage Objet MinIO
  # ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: meeting_ai_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Initialisation automatique du bucket MinIO
  minio-init:
    image: minio/mc:latest
    container_name: meeting_ai_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing myminio/${MINIO_BUCKET_NAME:-meetings};
      mc anonymous set public myminio/${MINIO_BUCKET_NAME:-meetings};
      exit 0;
      "

  # ────────────────────────────────────────────────────────
  # Gestionnaire d'Identité Keycloak
  # ────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: meeting_ai_keycloak
    restart: always
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_RELATIVE_PATH: /keycloak
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./docker/keycloak/realm-import.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8080:8080"
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /keycloak/health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ────────────────────────────────────────────────────────
  # LLM Local Ollama
  # ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: meeting_ai_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/11434 && echo -e 'GET /api/tags HTTP/1.0\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5

  # Initialisation automatique du modèle Ollama
  ollama-init:
    image: curlimages/curl:latest
    container_name: meeting_ai_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until curl -s http://ollama:11434/api/tags; do sleep 5; done;
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"${OLLAMA_MODEL:-mistral}\"}';
      exit 0;
      "

  # ────────────────────────────────────────────────────────
  # Base de Données Vectorielle ChromaDB
  # ────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: meeting_ai_chromadb
    restart: always
    volumes:
      - chromadb_data:/index_data
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────
  # Backend API FastAPI
  # ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting_ai_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "False"
      KEYCLOAK_SERVER_URL: http://keycloak:8080/keycloak
      KEYCLOAK_REALM: meeting-ai
      KEYCLOAK_CLIENT_ID: meeting-ai-backend
      OLLAMA_HOST: http://ollama:11434
      CHROMA_PERSIST_DIRECTORY: /app/chroma_db
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-supersecretjwtkeyforlocaldevelopment}
      BACKEND_CORS_ORIGINS: "http://localhost,http://localhost:3000"
    volumes:
      - chroma_db_volume:/app/chroma_db
    ports:
      - "8000:8000"

  # ────────────────────────────────────────────────────────
  # Celery Worker (Traitement Asynchrone)
  # ────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting_ai_celery_worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "False"
      OLLAMA_HOST: http://ollama:11434
      CHROMA_PERSIST_DIRECTORY: /app/chroma_db
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    volumes:
      - chroma_db_volume:/app/chroma_db
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

  # ────────────────────────────────────────────────────────
  # Flower (Monitoring Celery)
  # ────────────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting_ai_flower
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5555:5555"
    command: celery -A app.workers.celery_app flower --port=5555
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ────────────────────────────────────────────────────────
  # Frontend React (Nginx statique)
  # ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meeting_ai_frontend
    restart: always
    depends_on:
      - backend

  # ────────────────────────────────────────────────────────
  # Reverse Proxy Nginx Global
  # ────────────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: meeting_ai_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

  # ────────────────────────────────────────────────────────
  # Monitoring : Prometheus
  # ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: meeting_ai_prometheus
    restart: always
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ────────────────────────────────────────────────────────
  # Monitoring : Grafana
  # ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: meeting_ai_grafana
    restart: always
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

# ──────────────────────────────────────────────────────────
# Volumes persistants partagés
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:
  ollama_data:
  chromadb_data:
  prometheus_data:
  grafana_data:
  chroma_db_volume:
